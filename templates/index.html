<!DOCTYPE html>
<html>
<head>
    <title>{{ project_name }}</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #e94560; }
        .status { background: #16213e; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .status-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #0f3460; }
        .status-item:last-child { border-bottom: none; }
        .label { color: #0f3460; font-weight: bold; }
        .value { color: #e94560; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{ project_name }}</h1>
            <p>Secure Remote Tool v{{ version }}</p>
        </header>
        <div class="status">
            <h2>Status</h2>
            <div class="status-item">
                <span class="label">Server Status:</span>
                <span class="value">{{ status }}</span>
            </div>
            <div class="status-item">
                <span class="label">Connected Clients:</span>
                <span class="value">{{ client_count }}</span>
            </div>
            <div class="status-item">
                <span class="label">Protocol:</span>
                <span class="value">HTTPS/WSS (TLS Encrypted)</span>
            </div>
            <div class="status-item">
                <span class="label">Authentication:</span>
                <span class="value">Password Protected</span>
            </div>
        </div>
    </div>
</body>
</html>
